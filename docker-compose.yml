services:
  sandbox:
    build: .
    volumes:
      - .:/workspace
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - ~/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    environment:
      - GH_TOKEN=${GH_TOKEN:-}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Lennart Jansen}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-lennart.jansen@envelio.de}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Lennart Jansen}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-lennart.jansen@envelio.de}
    stdin_open: true
    tty: true
