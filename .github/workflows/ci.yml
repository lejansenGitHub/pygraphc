name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [ruff, mypy]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - name: Verify C extensions built
        if: matrix.check == 'mypy'
        run: python -c "from cgraph._core import cc_ctx; from cgraph._dag_learn import hill_climb_k2"
      - name: ruff check
        if: matrix.check == 'ruff'
        run: ruff check src/ tests/ && ruff format --check src/ tests/
      - name: mypy
        if: matrix.check == 'mypy'
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - name: Unit tests
        run: pytest tests/unit_tests/ -x -v --cov=src --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  performance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - name: graph-algorithms
            files: test_performance.py test_bfs_perf.py
          - name: bridges-dijkstra
            files: test_bridges_perf.py test_dijkstra_perf.py
          - name: masked-views
            files: test_masked_views.py
          - name: phase6
            files: test_phase6_perf.py
          - name: cc-branches
            files: test_cc_branches_perf.py
    name: performance (${{ matrix.suite.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev,benchmark]" vendor/blueprint_linters-*.whl
      - name: Performance tests
        run: |
          cd tests/performance_tests
          pytest ${{ matrix.suite.files }} -v -s

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install diff-cover
      - uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: diff-cover
        run: diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
